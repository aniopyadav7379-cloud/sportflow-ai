version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sportflow
      POSTGRES_PASSWORD: sportflow
      POSTGRES_DB: sportflow
    ports:
      - "5432:5432"
    volumes:
      - sportflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_PROVIDER: postgresql
      DATABASE_URL: "postgresql://sportflow:sportflow@db:5432/sportflow?schema=public"
      JWT_SECRET: "change-this-in-production"
      NODE_ENV: production
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE:-}
    ports:
      - "3000:3000"
    volumes:
      - sportflow_uploads:/app/public/uploads

volumes:
  sportflow_pgdata:
  sportflow_uploads:
